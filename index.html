let cur=0;

function renderSlide(){
  const wrap=document.getElementById('slideWrap');
  const s=SLIDES[cur];
  wrap.innerHTML=`<div class="slide ${s.bg} active" style="padding:${s.bg==='s-cover'?'52px 52px 40px':'36px 44px'}">${s.html}</div>`;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===SLIDES.length-1;
  document.getElementById('sc').textContent=`${cur+1} / ${SLIDES.length}`;
  renderDots();
}

function renderDots(){
  const row=document.getElementById('dotsRow');
  row.innerHTML='';
  SLIDES.forEach((_,i)=>{
    const d=document.createElement('button');
    d.className='dot'+(i===cur?' active':'');
    d.setAttribute('aria-label',`Diapositiva ${i+1}`);
    d.onclick=()=>{cur=i;renderSlide();};
    row.appendChild(d);
  });
}

function go(dir){
  cur=Math.max(0,Math.min(SLIDES.length-1,cur+dir));
  renderSlide();
}

document.getElementById('pres').addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){go(1);e.preventDefault();}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){go(-1);e.preventDefault();}
});

renderSlide();
</script>
