<script>
function scale(){
  const stage=document.getElementById('stage');
  const wrap=document.getElementById('scaler-wrap');
  const s=Math.min(wrap.clientWidth/960,wrap.clientHeight/540);
  stage.style.transform='scale('+s+')';
}
window.addEventListener('resize',scale);
scale();

function toggleFS(){
  const el=document.documentElement;
  if(!document.fullscreenElement){
    el.requestFullscreen&amp;&amp;el.requestFullscreen();
    document.getElementById('fsBtn').textContent='✕ Salir';
  } else {
    document.exitFullscreen&amp;&amp;document.exitFullscreen();
    document.getElementById('fsBtn').textContent='⛶ Pantalla completa';
  }
}
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement) document.getElementById('fsBtn').textContent='⛶ Pantalla completa';
  setTimeout(scale,100);
});
document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F') toggleFS();
});
</script>

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#050D15;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
#scaler-wrap{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#050D15}
#stage{width:960px;height:540px;position:relative;transform-origin:center center;overflow:hidden;background:linear-gradient(135deg,#070F1A 0%,#0F2A4A 100%)}

.sb-logo-text{font-size:8.5px;color:rgba(255,255,255,0.3);line-height:1.4}
.sb-items{flex:1;overflow:hidden;padding:0 8px}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;margin-bottom:1px}
.sb-item.active{background:rgba(107,165,128,0.15);border:1px solid rgba(107,165,128,0.2)}
.sb-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);flex-shrink:0}
.sb-item.active .sb-dot{background:#6BA580}
.sb-num{font-size:8px;color:rgba(255,255,255,0.2);flex-shrink:0;min-width:14px}
.sb-item.active .sb-num{color:rgba(141,196,163,0.6)}
.sb-label{font-size:9.5px;color:rgba(255,255,255,0.35);line-height:1.3}

.sb-bottom{padding:10px 14px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:6px}
.sb-home{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;background:rgba(107,165,128,0.08);border:1px solid rgba(107,165,128,0.15)}
.sb-home-label{font-size:9px;color:#8DC4A3;font-weight:500}

.main{position:absolute;left:172px;right:0;top:0;bottom:52px;padding:26px 32px 20px;overflow:hidden}
.sec-tag{display:inline-block;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:2px 10px;border-radius:20px;background:rgba(107,165,128,0.15);color:#8DC4A3;margin-bottom:10px}
.sec-h{font-size:20px;font-weight:500;color:#fff;line-height:1.25;margin-bottom:3px}
.sec-sub{font-size:11px;color:rgba(255,255,255,0.35);line-height:1.5;margin-bottom:18px}

.capas{display:flex;flex-direction:column;gap:6px}
.capa{display:flex;align-items:flex-start;gap:12px;padding:9px 14px;border-radius:9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);transition:background 0.15s}
.capa:hover{background:rgba(255,255,255,0.07)}
.capa-badge{font-size:8.5px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;white-space:nowrap;margin-top:2px;letter-spacing:0.04em}
.cb-estatal{background:#1a3a6e;color:#85B7EB}
.cb-anda{background:#1a3a2a;color:#8DC4A3}
.cb-pri{background:#3a2a0a;color:#FAC775}
.cb-plan{background:#2a1a3a;color:#C4BCEC}
.cb-conv{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75)}
.capa-content{flex:1}
.capa-ley{font-size:12px;font-weight:500;color:#fff;line-height:1.4;margin-bottom:2px}
.capa-ref{font-size:10px;color:rgba(255,255,255,0.38);line-height:1.5}

.cep-line{margin-top:10px;padding:9px 14px;border-radius:8px;background:rgba(107,165,128,0.06);border:1px solid rgba(107,165,128,0.15);display:flex;align-items:center;gap:10px}
.cep-icon{width:18px;height:18px;border-radius:50%;background:rgba(107,165,128,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.cep-text{font-size:10.5px;color:rgba(255,255,255,0.5);line-height:1.5;font-style:italic}
.cep-text b{font-weight:500;color:rgba(255,255,255,0.75);font-style:normal}

.botnav{position:absolute;left:172px;right:0;bottom:0;height:52px;background:rgba(0,0,0,0.35);border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.bnav-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:7px;padding:5px 16px;font-size:11px;cursor:pointer;color:rgba(255,255,255,0.6)}
.bnav-btn:disabled{opacity:0.2;cursor:default}
.bnav-center{font-size:10px;color:rgba(255,255,255,0.22)}
.bnav-home{background:rgba(107,165,128,0.1);border:1px solid rgba(107,165,128,0.25);border-radius:7px;padding:5px 14px;font-size:10px;cursor:pointer;color:#8DC4A3;font-weight:500}

.fs-btn{position:fixed;top:12px;right:12px;background:rgba(107,165,128,0.12);border:1px solid rgba(107,165,128,0.25);border-radius:7px;padding:5px 12px;font-size:10px;cursor:pointer;color:#8DC4A3;font-family:system-ui,sans-serif;z-index:100}

});

.fase-row{display:flex;align-items:center;gap:8px}
.fase-box{flex:1;border-radius:7px;border:1px solid;padding:7px 10px;display:flex;align-items:center;gap:8px}
.fb1{background:rgba(133,183,235,0.08);border-color:rgba(133,183,235,0.2)}
.fb2{background:rgba(107,165,128,0.08);border-color:rgba(107,165,128,0.2)}
.fb3{background:rgba(250,199,117,0.08);border-color:rgba(250,199,117,0.2)}
.fb4{background:rgba(175,169,236,0.08);border-color:rgba(175,169,236,0.2)}
.fase-icon{font-size:15px;flex-shrink:0}
.fase-info{flex:1}
.fase-periodo{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.fb1 .fase-periodo{color:#85B7EB}
.fb2 .fase-periodo{color:#8DC4A3}
.fb3 .fase-periodo{color:#FAC775}
.fb4 .fase-periodo{color:#AFA9EC}
.fase-title{font-size:10px;font-weight:500;color:#fff;line-height:1.2;margin-top:1px}
.fase-connector{display:flex;flex-direction:column;align-items:center;height:6px;justify-content:center}
.fase-vline{width:1px;height:6px;background:rgba(107,165,128,0.35)}

/* COLUMNA DERECHA */
.col-right{flex:1;padding:18px 22px 14px 18px;display:flex;flex-direction:column;gap:12px}

/* FUENTES 2 COLUMNAS */
.fuentes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.fuente-group{display:flex;flex-direction:column;gap:3px}
.fuente-title{font-size:10px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ft-icon{font-size:13px}
.ft-name{font-weight:500}
.fc-doc .ft-name{color:#85B7EB}
.fc-dir .ft-name{color:#8DC4A3}
.fc-per .ft-name{color:#FAC775}
.fc-dig .ft-name{color:#AFA9EC}
.fuente-item{font-size:10px;color:rgba(255,255,255,0.48);line-height:1.5;display:flex;gap:5px;padding-left:4px}
.fuente-item::before{content:'–';color:rgba(255,255,255,0.2);flex-shrink:0}

/* SEPARADOR */
.sep{height:1px;background:rgba(255,255,255,0.07)}

/* FILA CLAVE + RESULTADO */
.resultado-area{display:flex;align-items:flex-start;gap:10px}

.clave-box{flex:1;padding:10px 14px;background:rgba(107,165,128,0.07);border:1px solid rgba(107,165,128,0.18);border-radius:9px}
.clave-eyebrow{font-size:8px;font-weight:600;color:rgba(107,165,128,0.6);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.clave-text{font-size:11px;color:rgba(255,255,255,0.7);font-style:italic;line-height:1.5}
.clave-text b{font-weight:500;color:#8DC4A3;font-style:normal}

/* FLECHA SVG entre clave e informe */
.flecha-derecha{display:flex;align-items:center;flex-shrink:0;margin-top:14px}

.resultado-col{display:flex;flex-direction:column;gap:6px;flex-shrink:0;width:180px}
.inf-exec{padding:10px 13px;background:rgba(107,165,128,0.12);border:1px solid rgba(107,165,128,0.3);border-radius:9px}
.inf-exec-title{font-size:10.5px;font-weight:500;color:#8DC4A3;margin-bottom:2px}
.inf-exec-sub{font-size:9px;color:rgba(255,255,255,0.38);line-height:1.4}

.tabla3-btn{background:rgba(175,169,236,0.1);border:1px solid rgba(175,169,236,0.28);border-radius:8px;padding:7px 12px;font-size:9.5px;font-weight:500;color:#AFA9EC;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;white-space:nowrap;justify-content:center}
.tabla3-btn:hover{background:rgba(175,169,236,0.2);color:#fff}

.ambito-box{padding:8px 13px;background:rgba(133,183,235,0.07);border:1px solid rgba(133,183,235,0.18);border-radius:9px}
.ambito-title{font-size:9.5px;font-weight:500;color:#85B7EB;margin-bottom:2px}
.ambito-sub{font-size:9px;color:rgba(255,255,255,0.35);line-height:1.4}

/* MODAL */
.modal-overlay{position:absolute;inset:0;background:rgba(5,13,21,0.93);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#0F2A4A;border:1px solid rgba(175,169,236,0.3);border-radius:12px;width:100%;max-width:600px;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(175,169,236,0.1);border-bottom:1px solid rgba(175,169,236,0.15)}
.modal-title{font-size:12px;font-weight:500;color:#AFA9EC}
.modal-subtitle{font-size:9.5px;color:rgba(255,255,255,0.32);margin-top:1px}
.modal-close{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer}
.modal-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.modal-body{padding:14px 18px}
.tabla{width:100%;border-collapse:collapse}
.tabla th{font-size:9px;font-weight:600;color:rgba(255,255,255,0.4);text-align:left;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,0.1);text-transform:uppercase;letter-spacing:0.06em}
.tabla td{font-size:10px;color:rgba(255,255,255,0.7);padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.4;vertical-align:top}
.tabla tr:last-child td{border-bottom:none}
.t-badge{display:inline-block;font-size:8.5px;font-weight:500;padding:1px 7px;border-radius:20px;white-space:nowrap}
.tb-doc{background:rgba(133,183,235,0.15);color:#85B7EB}
.tb-dir{background:rgba(107,165,128,0.15);color:#8DC4A3}
.tb-per{background:rgba(250,199,117,0.15);color:#FAC775}
.tb-dig{background:rgba(175,169,236,0.15);color:#AFA9EC}
.modal-footer{padding:6px 18px 12px;font-size:9px;color:rgba(255,255,255,0.22);font-style:italic}

.botnav{position:absolute;left:172px;right:0;bottom:0;height:52px;background:rgba(0,0,0,0.35);border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.bnav-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:7px;padding:5px 16px;font-size:11px;cursor:pointer;color:rgba(255,255,255,0.6)}
.bnav-center{font-size:10px;color:rgba(255,255,255,0.22)}
.bnav-home{background:rgba(107,165,128,0.1);border:1px solid rgba(107,165,128,0.25);border-radius:7px;padding:5px 14px;font-size:10px;cursor:pointer;color:#8DC4A3;font-weight:500}
.fs-btn{position:fixed;top:12px;right:12px;background:rgba(107,165,128,0.12);border:1px solid rgba(107,165,128,0.25);border-radius:7px;padding:5px 12px;font-size:10px;cursor:pointer;color:#8DC4A3;font-family:system-ui,sans-serif;z-index:100}

/* MODALES INFO */
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:rgba(107,165,128,0.15);border:1px solid rgba(107,165,128,0.3);color:#6BA580;font-size:9px;cursor:pointer;vertical-align:middle;margin-left:4px;flex-shrink:0;line-height:1;font-style:normal;user-select:none}
.info-btn:hover{background:rgba(107,165,128,0.3);color:#8DC4A3}
.info-overlay{position:absolute;inset:0;background:rgba(5,13,21,0.88);z-index:60;display:none;align-items:center;justify-content:center;padding:24px}
.info-overlay.open{display:flex}
.info-modal{background:#0F2A4A;border:1px solid rgba(107,165,128,0.3);border-radius:12px;width:100%;max-width:520px;overflow:hidden}
.info-modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(107,165,128,0.1);border-bottom:1px solid rgba(107,165,128,0.15)}
.info-modal-title{font-size:13px;font-weight:500;color:#8DC4A3}
.info-modal-close{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer}
.info-modal-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.info-modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.info-modal-section{font-size:10.5px;color:rgba(255,255,255,0.65);line-height:1.6}
.info-modal-section b{font-weight:500;color:#fff}
.info-modal-pills{display:flex;flex-wrap:wrap;gap:6px}
.info-modal-pill{font-size:9.5px;padding:3px 10px;border-radius:20px;background:rgba(107,165,128,0.12);border:1px solid rgba(107,165,128,0.25);color:#8DC4A3}
</style>

        <div class=&quot;info-modal-section&quot;><b>¿Qué es?</b> Indicador de satisfacción y fidelización que mide la probabilidad de que alguien recomiende un servicio. Se obtiene con una única pregunta: «¿En qué medida recomendarías esta formación a un compañero?» en escala del 0 al 10.</div>
        <div class=&quot;info-modal-section&quot;><b>Cálculo:</b> % de promotores (9-10) menos % de detractores (0-6). Resultado entre -100 y +100. El CEP de Málaga lo usa en su protocolo diagnóstico para medir la satisfacción de los centros con la oferta formativa previa.</div>
        <div class=&quot;info-modal-section&quot;><b>En la asesoría:</b> Complementa las encuestas de satisfacción del cuestionario anual del CEP y los cuestionarios de Séneca al cierre de cada actividad.</div>

<script>
function scale(){
  const s=document.getElementById('stage');
  const w=document.getElementById('scaler-wrap');
  s.style.transform='scale('+Math.min(w.clientWidth/960,w.clientHeight/540)+')';
}
window.addEventListener('resize',scale);scale();

function toggleFS(){
  const el=document.documentElement;
  if(!document.fullscreenElement){el.requestFullscreen&amp;&amp;el.requestFullscreen();document.getElementById('fsBtn').textContent='✕ Salir';}
  else{document.exitFullscreen&amp;&amp;document.exitFullscreen();document.getElementById('fsBtn').textContent='⛶ Pantalla completa';}
}
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement)document.getElementById('fsBtn').textContent='⛶ Pantalla completa';
  setTimeout(scale,100);
});
document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F')toggleFS();
  if(e.key===' '||e.key==='Enter')mostrarFrase();
});

var mostrado=false;
function mostrarFrase(){
  if(mostrado)return;
  mostrado=true;
  document.getElementById('hint').classList.add('hidden');
  document.getElementById('fraseHero').classList.add('visible');
  // Ampliar círculo de fondo
  var c=document.getElementById('bgCircle');
  c.style.width='700px';
  c.style.height='700px';
  c.style.background='radial-gradient(circle,rgba(107,165,128,0.1) 0%,transparent 70%)';
  c.style.transition='all 1.2s ease';
}
</script>
</body>

<button id="fs-btn" onclick="toggleFS()">⛶ Pantalla completa</button>
<script>
var current = 'portada';
var order = ['portada','s01','s02','s03','s04','s05','s06','s07','s08a','s08b','s09','s10','s11','cierre'];

function goTo(sid){
  document.getElementById('frame-'+current).classList.remove('active');
  document.getElementById('frame-'+sid).classList.add('active');
  current = sid;
}

function toggleFS(){
  var el=document.documentElement;
  if(!document.fullscreenElement){
    el.requestFullscreen&&el.requestFullscreen();
    document.getElementById('fs-btn').textContent='✕ Salir';
  }else{
    document.exitFullscreen&&document.exitFullscreen();
    document.getElementById('fs-btn').textContent='⛶ Pantalla completa';
  }
}
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement)document.getElementById('fs-btn').textContent='⛶ Pantalla completa';
});
document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F')toggleFS();
  if(e.key==='ArrowRight'){
    var idx=order.indexOf(current);
    if(idx<order.length-1)goTo(order[idx+1]);
  }
  if(e.key==='ArrowLeft'){
    var idx=order.indexOf(current);
    if(idx>0)goTo(order[idx-1]);
  }
});
</script>
</body>
